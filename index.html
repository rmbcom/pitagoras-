  background:white;
  border:2px solid #333;

</head>
<body>

<div class="container">
  <h1>Teorema de Pitágoras</h1>

  <p>Aciertos: <span id="hits">0</span> | Fallos: <span id="fails">0</span></p>

  <svg id="canvas" width="600" height="600" viewBox="0 0 500 500"></svg>

  <h2 id="question"></h2>

  <div id="options"></div>

  <p id="operation"></p>
  <p id="feedback"></p>

  <button onclick="newTriangle()">Nuevo triángulo</button>
  <button onclick="resetScore()">Reiniciar puntuación</button>
</div>

<script>
const svg = document.getElementById("canvas");
const question = document.getElementById("question");
const optionsDiv = document.getElementById("options");
const operation = document.getElementById("operation");
const feedback = document.getElementById("feedback");
const hitsSpan = document.getElementById("hits");
const failsSpan = document.getElementById("fails");

let hits = 0;
let fails = 0;
let correctAnswer = 0;
let answered = false;

function round2(n){
  return Math.round(n * 100) / 100;
}

function format(n){
  return Number.isInteger(n) ? n : n.toFixed(2);
}

function clearSVG(){
  svg.innerHTML = "";
}

function drawGrid(){
  const defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");

  const pattern = document.createElementNS("http://www.w3.org/2000/svg", "pattern");
  pattern.setAttribute("id", "grid");
  pattern.setAttribute("width", "10");
  pattern.setAttribute("height", "10");
  pattern.setAttribute("patternUnits", "userSpaceOnUse");

  const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
  path.setAttribute("d", "M 10 0 L 0 0 0 10");
  path.setAttribute("fill", "none");
  path.setAttribute("stroke", "#dce6f2");
  path.setAttribute("stroke-width", "0.5");

  pattern.appendChild(path);
  defs.appendChild(pattern);
  svg.appendChild(defs);

  const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
  rect.setAttribute("width", "500");
  rect.setAttribute("height", "500");
  rect.setAttribute("fill", "url(#grid)");
  svg.appendChild(rect);
}

function drawTriangle(a, b){
  const margin = 60;

  const scale = Math.min(
    350 / Math.max(a, b),
    1
  );

  const A = {x: margin, y: 440};
  const B = {x: margin + a * scale, y: 440};
  const C = {x: margin, y: 440 - b * scale};

  const polygon = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
  polygon.setAttribute("points", `${A.x},${A.y} ${B.x},${B.y} ${C.x},${C.y}`);
  polygon.setAttribute("fill", "rgba(91, 155, 213, 0.35)");
  polygon.setAttribute("stroke", "#1f4e79");
  polygon.setAttribute("stroke-width", "3");
  svg.appendChild(polygon);

  drawLabel((A.x+B.x)/2, A.y+22, "a = " + a);
  drawLabel(A.x-35, (A.y+C.y)/2, "b = " + b);
  drawLabel((B.x+C.x)/2+25, (B.y+C.y)/2, "c");
}

function drawLabel(x, y, text){
  const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
  label.setAttribute("x", x);
  label.setAttribute("y", y);
  label.setAttribute("font-size", "16");
  label.setAttribute("text-anchor", "middle");
  label.setAttribute("fill", "#111");
  label.textContent = text;
  svg.appendChild(label);
}

function shuffle(array){
  return array.sort(() => Math.random() - 0.5);
}

function generateOptions(correct){
  let options = [correct];

  while(options.length < 3){
    let variation = round2(correct + (Math.random() * 10 - 5));
    if(variation > 0 && !options.includes(variation)){
      options.push(variation);
    }
  }

  return shuffle(options);
}

function newTriangle(){
  answered = false;
  feedback.textContent = "";
  optionsDiv.innerHTML = "";
  operation.textContent = "";

  clearSVG();
  drawGrid();

  const a = Math.floor(Math.random() * 30) + 5;
  const b = Math.floor(Math.random() * 30) + 5;
  const c = round2(Math.sqrt(a*a + b*b));

  const unknown = ["a", "b", "c"][Math.floor(Math.random() * 3)];

  let knownA = a;
  let knownB = b;

  if(unknown === "c"){
    correctAnswer = c;
    question.textContent = `Calcula la hipotenusa c. Catetos: a = ${a}, b = ${b}`;
    operation.textContent = `c² = ${a}² + ${b}² = ${a*a} + ${b*b} = ${a*a+b*b}. Por tanto, c = √${a*a+b*b}`;
  } else if(unknown === "a"){
    correctAnswer = round2(Math.sqrt(c*c - b*b));
    question.textContent = `Calcula el cateto a. Hipotenusa: c = ${format(c)}, cateto b = ${b}`;
    operation.textContent = `a² = c² - b² = ${format(c)}² - ${b}²`;
    knownA = "?";
  } else {
    correctAnswer = round2(Math.sqrt(c*c - a*a));
    question.textContent = `Calcula el cateto b. Hipotenusa: c = ${format(c)}, cateto a = ${a}`;
    operation.textContent = `b² = c² - a² = ${format(c)}² - ${a}²`;
    knownB = "?";
  }

  drawTriangle(a, b);

  const options = generateOptions(correctAnswer);

  options.forEach(opt => {
    const btn = document.createElement("button");
    btn.className = "option";
    btn.textContent = format(opt);
    btn.onclick = () => checkAnswer(btn, opt);
    optionsDiv.appendChild(btn);
  });
}

function checkAnswer(button, value){
  if(answered) return;
  answered = true;

  const buttons = document.querySelectorAll(".option");

  buttons.forEach(btn => {
    if(Number(btn.textContent) === correctAnswer){
      btn.classList.add("correct");
    }
  });

  if(value === correctAnswer){
    hits++;
    feedback.textContent = "Correcto.";
    button.classList.add("correct");
  } else {
    fails++;
    feedback.textContent = `Incorrecto. La respuesta correcta era ${format(correctAnswer)}.`;
    button.classList.add("wrong");
  }

  hitsSpan.textContent = hits;
  failsSpan.textContent = fails;

  setTimeout(newTriangle, 2500);
}

function resetScore(){
  hits = 0;
  fails = 0;
  hitsSpan.textContent = hits;
  failsSpan.textContent = fails;
}

newTriangle();
</script>

</body>
